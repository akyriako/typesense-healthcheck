name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: akyriako78/typesense-healthcheck

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read base version from Makefile
        id: base_version
        run: |
          BASE_VERSION="$(make -pn | awk '/^TAG[ ?]*=/ {print $3; exit}')"
          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: meta
        run: |
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMIT="${GITHUB_SHA::7}"
          BASE_VERSION="${{ steps.base_version.outputs.base_version }}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:latest"
          else
            VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}"
            TAGS="${IMAGE_NAME}:${VERSION}"
          fi

          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
            BUILT_BY=github-actions
            DIRTY=false